<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>World Landmark Quiz Game</title>

<style>
    body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: linear-gradient(120deg, #1e3c72, #2a5298);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow-y: hidden;
    }   

    .game-container {
    text-align: center;
    width: 90vw;
    max-width: 650px;
    height: 95vh;
    max-height: 95vh;
    background: rgba(0,0,0,0.45);
    padding: 2vh;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);

    display: flex;
    flex-direction: column;
    justify-content: space-evenly;
    }

    img {
    width: auto;
    max-width: 100%;
    max-height: 35vh;
    height: auto;
    object-fit: contain;
    border-radius: 12px;
    margin: 0 auto;
    border: 3px solid white;
    }

    .options button {
    display: block;
    width: 100%;
    margin: 0.5vh 0;
    padding: 1.5vh;
    font-size: clamp(12px, 2vh, 18px);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #ffffff;
    color: #333;
    transition: 0.2s;
    }

    .options button:hover {
        background: #ffd54f;
    }

    .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.85);
        justify-content: center;
        align-items: center;
    }

    .modal-content {
        background: white;
        color: black;
        padding: 30px;
        border-radius: 15px;
        text-align: center;
        animation: pop 0.4s ease;
    }

    @keyframes pop {
        0% { transform: scale(0.3); opacity: 0; }
        100% { transform: scale(1); opacity: 1; }
    }

    .modal button {
        margin-top: 15px;
        padding: 10px 20px;
        border: none;
        background: #e53935;
        color: white;
        border-radius: 8px;
        cursor: pointer;
    }

    .modal button:hover {
        background: #c62828;
    }

    #confettiCanvas {
    position: fixed;
    top: 0;
    left: 0;
    pointer-events: none;
    width: 100%;
    height: 100%;
    z-index: 999;
    }     
</style>
</head>

<body>

<div class="game-container">
    <h2>🌍 Landmark Quiz Game</h2>
    <p id="question">Which landmark is this?</p>

    <img id="landmarkImage" src="" alt="Landmark">

    <div class="options" id="options"></div>

    <p id="progress"></p>
</div>

<div class="modal" id="gameOverModal">
    <div class="modal-content">
        <h2>💀 Game Over</h2>
        <p>You chose the wrong answer!</p>
        <button onclick="restartGame()">Try Again</button>
    </div>
</div>
<div class="modal" id="winModal">
    <div class="modal-content">
        <h2>🎉 You Win!</h2>
        <p id="finalScoreText"></p>
        <button onclick="restartGame()">Play Again</button>
    </div>
</div>
<script>
const correctSound = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3")
const quizData = [
    {
        image: "https://commons.wikimedia.org/wiki/Special:FilePath/Tower%20Bridge%20London.jpg",
        options: ["Eiffel Tower", "Tower Bridge", "Brooklyn Bridge", "Golden Gate Bridge"],
        answer: "Tower Bridge"
    },
    {
        image: "https://commons.wikimedia.org/wiki/Special:FilePath/Taj-Mahal.jpg",
        options: ["Taj Mahal", "Petra", "Great Wall of China", "Colosseum"],
        answer: "Taj Mahal"
    },
    {
        image: "https://commons.wikimedia.org/wiki/Special:FilePath/Colosseum%20in%20Rome.jpg",
        options: ["Parthenon", "Colosseum", "Pantheon", "Big Ben"],
        answer: "Colosseum"
    },
    {
        image: "https://commons.wikimedia.org/wiki/Special:FilePath/Golden%20Gate%20Bridge%20from%20Battery%20Spencer.jpg",
        options: ["Sydney Opera House", "Golden Gate Bridge", "Brooklyn Bridge", "Millau Viaduct"],
        answer: "Golden Gate Bridge"
    },
    {
        image: "https://commons.wikimedia.org/wiki/Special:FilePath/Machu%20Picchu%20%28Peru%29.jpg",
        options: ["Chichen Itza", "Machu Picchu", "Angkor Wat", "Petra"],
        answer: "Machu Picchu"
    },
    {
        image: "https://upload.wikimedia.org/wikipedia/commons/thumb/2/23/The_Great_Wall_of_China_at_Jinshanling-edit.jpg/960px-The_Great_Wall_of_China_at_Jinshanling-edit.jpg",
        options: ["Great Wall of China", "Roman Walls", "Berlin Wall", "Hadrian’s Wall"],
        answer: "Great Wall of China"
    },
    {
        image: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e8/Al_Deir_Petra.JPG/330px-Al_Deir_Petra.JPG",
        options: ["Petra", "Luxor Temple", "Angkor Wat", "Timbuktu"],
        answer: "Petra"
    },
    {
        image: "https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Unique_Moment_with_the_Moon_and_Christ_the_Redeemer_3.jpg/960px-Unique_Moment_with_the_Moon_and_Christ_the_Redeemer_3.jpg",
        options: ["Statue of Liberty", "Christ the Redeemer", "Motherland Calls", "Big Buddha"],
        answer: "Christ the Redeemer"
    },
    {
        image: "https://upload.wikimedia.org/wikipedia/commons/thumb/f/f5/Buddhist_monks_in_front_of_the_Angkor_Wat.jpg/500px-Buddhist_monks_in_front_of_the_Angkor_Wat.jpg",
        options: ["Borobudur", "Angkor Wat", "Bagan Temples", "Karnak"],
        answer: "Angkor Wat"
    },
    {
        image: "https://upload.wikimedia.org/wikipedia/commons/thumb/3/3c/Stonehenge2007_07_30.jpg/500px-Stonehenge2007_07_30.jpg",
        options: ["Avebury", "Stonehenge", "Newgrange", "Callanish Stones"],
        answer: "Stonehenge"
    },
    {
        image: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Ahu-Akivi-1.JPG/500px-Ahu-Akivi-1.JPG",
        options: ["Olmec Heads", "Moai (Easter Island)", "Terracotta Army", "Sphinx"],
        answer: "Moai (Easter Island)"
    },
    {
        image: "https://upload.wikimedia.org/wikipedia/commons/thumb/5/51/Chichen_Itza_3.jpg/500px-Chichen_Itza_3.jpg",
        options: ["Chichen Itza", "Teotihuacan", "Tulum", "Copan"],
        answer: "Chichen Itza"
    },
    {
        image: "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a0/Sydney_Australia._%2821339175489%29.jpg/960px-Sydney_Australia._%2821339175489%29.jpg",
        options: ["Sydney Opera House", "Lotus Temple", "Harpa Concert Hall", "Burj Al Arab"],
        answer: "Sydney Opera House"
    },
    {
        image: "https://www.royalcaribbean.com/media-assets/pmc/content/dam/excalibur/digital-destinations/port-destinations/ports-of-call/florence-pisa-livorno-flr/stock-photo-the-leaning-tower-in-a-sunny-day-in-pisa-italy-745306897.jpg?w=1440",
        options: ["Leaning Tower of Pisa", "Big Ben", "Torres de Serranos", "Campanile di San Marco"],
        answer: "Leaning Tower of Pisa"
    }
];

let currentIndex = 0;
let score = 0;
let shuffledQuizData = [];

const imageEl = document.getElementById("landmarkImage");
const optionsEl = document.getElementById("options");
const progressEl = document.getElementById("progress");
const modal = document.getElementById("gameOverModal");
const winModal = document.getElementById("winModal");
const finalScoreText = document.getElementById("finalScoreText");

// Create score display
const scoreEl = document.createElement("p");
scoreEl.style.fontSize = "20px";
scoreEl.style.fontWeight = "bold";
document.querySelector(".game-container").insertBefore(scoreEl, progressEl);

// Shuffle function
function shuffleArray(array) {
    return array.sort(() => Math.random() - 0.5);
}

function loadQuestion() {
    const current = shuffledQuizData[currentIndex];

    imageEl.src = current.image;
    optionsEl.innerHTML = "";

    // Shuffle answer options
    const shuffledOptions = shuffleArray([...current.options]);

    shuffledOptions.forEach(option => {
        const btn = document.createElement("button");
        btn.textContent = option;
        btn.onclick = () => checkAnswer(option);
        optionsEl.appendChild(btn);
    });

    progressEl.textContent = `Question ${currentIndex + 1} of ${shuffledQuizData.length}`;
    scoreEl.textContent = `⭐ Score: ${score}`;
}
    
function checkAnswer(selected) {
    const correct = shuffledQuizData[currentIndex].answer;

    if (selected === correct) {
        correctSound.play();
        score++;
        currentIndex++;

        if (currentIndex >= shuffledQuizData.length) {
            showWinModal();
        } else {
            loadQuestion();
        }
    } else {
        showGameOver();
    }
}

function showGameOver() {
    modal.style.display = "flex";
}
function showWinModal() {
    finalScoreText.textContent = `Your Score: ${score}/${shuffledQuizData.length}`;
    winModal.style.display = "flex";
}

function restartGame() {
    modal.style.display = "none";
    winModal.style.display = "none";
    currentIndex = 0;
    score = 0;
    shuffledQuizData = shuffleArray([...quizData]);
    loadQuestion();
}

restartGame();
</script>
<canvas id="confettiCanvas"></canvas>
</body>
</html>
